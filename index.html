<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Worry Room - 포근한 걱정 보관소</title>
  <!-- Google Fonts: KoPub Batang (명조체) & Gowun Batang -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 메인 레이아웃 컨테이너 -->
  <main class="app-container">
    
    <!-- 타이틀 영역 (헤더) -->
    <header class="app-header">
      <h1 class="room-title">포근한 걱정 보관소</h1>
      <p class="room-subtitle">걱정을 인형에게 털어놓고, 바람에 날려보내거나 벽난로에 태워버리세요.</p>
    </header>

    <!-- 방 캔버스 영역 -->
    <div class="room-wrapper">
      <div class="room-container" id="room-container">
        <!-- 배경 레이어 (어두운 밤 모드 / 밝은 낮 모드) -->
        <img src="assets/room_dark.jpg" alt="Dark Room" class="room-bg room-dark-bg" id="bg-dark">
        <img src="assets/room_light.jpg" alt="Light Room" class="room-bg room-light-bg" id="bg-light">

        <!-- 조명 애니메이션 레이어 (어두운 모드에서 스탠드와 벽난로에 따스한 빛 추가) -->
        <div class="light-glow glow-lamp"></div>
        <div class="light-glow glow-fireplace"></div>

        <!-- 핫스팟 (클릭 및 마우스 호버 영역) -->
        <!-- 걱정인형 -->
        <div class="hotspot" id="hotspot-doll" style="top: 40%; left: 72.5%; width: 6.5%; height: 11%;" data-tooltip="걱정인형 (고민 털어놓기)"></div>
        <!-- 창문 -->
        <div class="hotspot" id="hotspot-window" style="top: 13%; left: 22%; width: 17%; height: 35%;" data-tooltip="창문 (바람에 고민 날리기)"></div>
        <!-- 벽난로 -->
        <div class="hotspot" id="hotspot-fireplace" style="top: 43%; left: 4%; width: 21%; height: 33%;" data-tooltip="벽난로 (불길에 고민 태우기)"></div>
        <!-- 책장 -->
        <div class="hotspot" id="hotspot-bookshelf" style="top: 17%; left: 65%; width: 25%; height: 16%;" data-tooltip="책장 (고민 기록 보기)"></div>
        <!-- 휴지통 -->
        <div class="hotspot" id="hotspot-trash" style="top: 62%; left: 82.5%; width: 9%; height: 14%;" data-tooltip="휴지통 (모든 걱정 비우기)"></div>
        <!-- 저장 설정 스위치 -->
        <div class="hotspot" id="hotspot-switch" style="top: 42%; left: 86.3%; width: 3.5%; height: 6%;" data-tooltip="스위치 (기록 저장 모드)"></div>
      </div>
    </div>

    <!-- 상태 인디케이터 (저장 모드 표시) -->
    <div class="status-panel">
      <span class="status-label">기록 저장 모드 :</span>
      <span class="status-value" id="status-text">켜짐 (로컬 스토리지에 보관됨)</span>
    </div>

    <!-- 편지지/고민 입력 모달 UI -->
    <div class="modal-overlay" id="worry-modal">
      <div class="worry-card">
        <button class="close-modal-btn" id="close-modal-btn" aria-label="닫기">&times;</button>
        <div class="worry-card-header">
          <h2>인형에게 털어놓는 고민</h2>
          <p>마음 속 깊이 담아둔 이야기를 편지에 적어보세요.</p>
        </div>
        <div class="worry-card-body">
          <textarea id="worry-input" placeholder="여기에 당신의 걱정을 적어주세요. 적어두는 것만으로도 마음이 가벼워질 수 있습니다..." maxlength="300"></textarea>
          <div class="char-counter"><span id="char-count">0</span>/300</div>
        </div>
        <div class="worry-card-footer">
          <button class="action-btn action-window" id="btn-action-window">
            <svg viewBox="0 0 24 24" class="btn-icon">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
            창문 밖으로 날리기
          </button>
          <button class="action-btn action-fireplace" id="btn-action-fireplace">
            <svg viewBox="0 0 24 24" class="btn-icon">
              <path d="M12 2S8.3 5.7 8.3 9.4c0 2.2 1.4 3.9 3.7 3.9 2.3 0 3.7-1.7 3.7-3.9C15.7 5.7 12 2 12 2zm0 18.3c-2.4 0-4.3-1.9-4.3-4.3 0-1.8 1.1-3 2.5-3.8.4-.2.9-.1 1.2.2l.6.6 2.1-2.1c.3-.3.9-.3 1.2 0 1.2 1.2 1.9 2.5 1.9 4.1 0 2.9-2.3 5.3-5.2 5.3z"/>
            </svg>
            벽난로에 태우기
          </button>
        </div>
      </div>
    </div>

    <!-- 책장 드로어 (Drawer) UI - 걱정 기록 목록 -->
    <div class="drawer-overlay" id="bookshelf-drawer">
      <div class="diary-drawer">
        <button class="close-drawer-btn" id="close-drawer-btn" aria-label="서랍 닫기">
          <svg viewBox="0 0 24 24" class="btn-icon-close">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
        <div class="diary-header">
          <h2>걱정 기록장</h2>
          <p>마음에 담아두고 고이 접어놓았던 생각들의 흔적입니다.</p>
        </div>
        <div class="diary-content">
          <div class="diary-empty-message" id="empty-message">
            <p>기록된 걱정이 없습니다.</p>
            <p class="sub-empty">저장 모드가 켜진 상태에서 고민을 날려보내면 이곳에 차곡차곡 보관됩니다.</p>
          </div>
          <ul class="worry-list" id="worry-list">
            <!-- 자바스크립트로 동적으로 추가됨 -->
          </ul>
        </div>
      </div>
    </div>

    <!-- 알림 토스트 메시지 컨테이너 -->
    <div class="toast-container" id="toast-container"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
